name: TriosCompassV2
# Launcher-only environment for Snakemake and project metadata parsing.
# Rule tools are provided by Docker/Singularity images in workflow/envs/containers.yaml.
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - snakemake==7.8.5
  - snakemake-wrapper-utils
  - pip==22.3.1
  - python==3.10.6
  # - mamba==1
  # https://github.com/snakemake/snakemake/issues/1899
  - tabulate==0.8.10 
  - pip:
    - eido==0.1.9
    - peds==1.3.2
    - peppy==0.35.4
